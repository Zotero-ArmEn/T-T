<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tag Review Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Tag Review Tool</h1>
    <div class="meta">
      <button id="btn-import">Import reviews.json</button>
      <button id="btn-export">Export reviews.json</button>
      <button id="btn-clear-local">Clear Local Cache</button>
    </div>
  </header>

  <main>
    <aside>
      <div class="filters">
        <label>Status:
          <select id="filter-status">
            <option value="all">All</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
            <option value="edited">Edited</option>
          </select>
        </label>
        <input id="search" type="search" placeholder="Search title…">
      </div>
      <ul id="item-list"></ul>
    </aside>

    <section id="editor">
      <div id="record-header">
        <button id="prev">◀</button>
        <div id="title-wrap">
          <div id="item-title"></div>
          <div class="subtitle">
            <label>Title transliteration:
              <input id="title-translit" type="text">
            </label>
            <label>Title translation:
              <input id="title-translation" type="text">
            </label>
          </div>
        </div>
        <button id="next">▶</button>
      </div>

      <div class="panes">
        <div class="pane">
          <h3>Original</h3>
          <div class="field"><b>ID:</b> <span id="fld-id"></span></div>
          <div class="field"><b>Status:</b> <span id="fld-status"></span></div>
          <div class="field"><b>Notes:</b>
            <textarea id="fld-notes" rows="2" placeholder="Your notes…"></textarea>
          </div>
        </div>

        <div class="pane">
          <h3>Generated Suggestions</h3>
          <div class="actions">
            <button id="approve-all">Approve All</button>
            <button id="reject-all">Reject All</button>
            <button id="add-tag">Add Tag</button>
          </div>
          <table id="tags-table">
            <thead>
              <tr>
                <th>Tag</th>
                <th>Lang</th>
                <th>Type</th>
                <th>Source</th>
                <th>Confidence</th>
                <th>Decision</th>
                <th>Edit</th>
              </tr>
            </thead>
            <tbody id="tags-body"></tbody>
          </table>
        </div>
      </div>

      <div class="footer-actions">
        <button id="save-local">Save (Local)</button>
        <span id="save-status"></span>
      </div>

      <details id="github-save">
        <summary>Save to GitHub (advanced)</summary>
        <div class="gh-grid">
          <label>Owner <input id="gh-owner" placeholder="your-github-username"></label>
          <label>Repo <input id="gh-repo" placeholder="your-repo-name"></label>
          <label>Branch <input id="gh-branch" value="main"></label>
          <label>Path <input id="gh-path" value="data/reviews.json"></label>
          <label>Token
            <input id="gh-token" placeholder="fine-grained token (repo:contents)">
          </label>
          <button id="btn-save-github">Save to GitHub</button>
          <span class="hint">Tip: create a fine-grained token limited to this repo, with "Contents: Read and write". Revoke after use.</span>
          <div id="gh-msg"></div>
        </div>
      </details>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
